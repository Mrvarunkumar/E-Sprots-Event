<!DOCTYPE html>
<html lang="en">

<head>
    <title>Apex Arena Esports</title>
    <link rel="stylesheet" href="../forntend/css/style.css">
</head>

<body>

    <div class="bg-animation"></div>
    <div class="particles"></div>

    <header class="header">
        <img src="../forntend/image/VTU.png" alt="Logo" class="logo-image">

        <div class="text-container">
            <h1 class="logo">VTU KALBURAGI</h1>
            <p class="subtitle">Centre for UG & PG Studies & Regional Office</p>
        </div>
    </header>

    <div class="header-text">
        <h1 class="logo">APEX ARENA</h1>
        <p class="subtitle"></p>
    </div>

    <div class="card-container">

        <!-- Free Fire Card -->
        <div class="card">
            <img src="../forntend/image/freefire.png" class="game-logo">
            <h2>FREE FIRE</h2>
            <button onclick="enterEvent('freefire.html')">Enter Event</button>
        </div>

        <!-- BGMI Card -->
        <div class="card">
            <img src="../forntend/image/bgmi.png" class="game-logo">
            <h2>BGMI</h2>
            <button onclick="enterEvent('bgmi.html')">Enter Event</button>
        </div>

        <!-- Hackathon Card (NEW) -->
        <div class="card">
            <img src="../forntend/image/hackathon.png" class="game-logo">
            <h2>HACKATHON</h2>
            <button onclick="enterEvent('hackathon.html')">Enter Event</button>
        </div>

        <!-- Quiz Card (NEW) -->
        <div class="card">
            <img src="../forntend/image/quiz.png" class="game-logo">
            <h2>QUIZ</h2>
            <button onclick="enterEvent('quiz.html')">Enter Event</button>
        </div>

    </div>

    <script src="../forntend/js/script.js"></script>
</body>

</html>
