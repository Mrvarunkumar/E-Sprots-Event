<!DOCTYPE html>
<html lang="en">
<head>
    <title>Apex Arena Esports</title>
    <link rel="stylesheet" href="../forntend/css/style.css">
</head>
<body>

<div class="bg-animation"></div>
<div class="particles"></div>

<header class="header">
    <img src="../forntend/image/VTU.png" alt="Logo" class="logo-image">

    <div class="text-container">
        <h1 class="logo">VTU KALBURAGI</h1>
        <p class="subtitle">Centre for UG & PG Studies & Regional Office</p>
    </div>
</header>
<div class="header-text">
        <h1 class="logo">APEX ARENA</h1>
        <p class="subtitle"></p>
</div>

<div class="card-container">

   <div class="card">
    <img src="../forntend/image/freefire.png" class="game-logo">
    <h2>FREE FIRE</h2>
    <p class="count-text">Total Registrations</p>
    <div class="count-box" id="freefire-count">0</div>
</div>

<div class="card">
    <img src="../forntend/image/bgmi.png" class="game-logo">
    <h2>BGMI</h2>
    <p class="count-text">Total Registrations</p>
    <div class="count-box" id="bgmi-count">0</div>
</div>

</div>

<script src="../forntend/js/script.js"></script>
</body>
</html>
